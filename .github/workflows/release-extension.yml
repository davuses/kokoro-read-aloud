name: Release extension builds

# Build the Chrome and Firefox extensions and attach them as zips to a GitHub
# Release whenever a version tag (e.g. v2.8.0) is pushed. Users can then install
# without Node/npm or building anything themselves. Can also be run manually
# (workflow_dispatch) to produce downloadable build artifacts for testing.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Build Chrome and Firefox
        working-directory: extension
        run: |
          node build.js chrome
          node build.js firefox

      - name: Package zips
        working-directory: extension
        run: |
          (cd dist-chrome && zip -r ../kokoro-extension-chrome.zip .)
          (cd dist-firefox && zip -r ../kokoro-extension-firefox.zip .)

      - name: Upload build artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: extension-zips
          path: |
            extension/kokoro-extension-chrome.zip
            extension/kokoro-extension-firefox.zip

      - name: Attach to GitHub Release (tag pushes)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            extension/kokoro-extension-chrome.zip
            extension/kokoro-extension-firefox.zip
          fail_on_unmatched_files: true
          generate_release_notes: true

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TTS Settings</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup-container">
      <h1 class="popup-title">Select TTS Engine</h1>
      <div class="tts-option">
        <label for="tts-select" class="option-label"
          >Choose a TTS Service</label
        >
        <!-- Kokoro voices are populated by popup.js from the server's /voices
             endpoint (with a hardcoded fallback if the server is offline). -->
        <select id="tts-select" class="option-select">
          <option value="google-translate" selected>Google Translate</option>
        </select>
        <div id="server-status" class="server-status" style="display: none;"></div>
      </div>

      <div id="server-url-row" class="tts-option" style="display: none;">
        <label for="server-url" class="option-label">Kokoro server URL</label>
        <input
          id="server-url"
          class="option-input"
          type="text"
          placeholder="http://localhost:18001"
          spellcheck="false"
          autocomplete="off"
        />
      </div>

      <div id="speed-row" class="tts-option" style="display: none;">
        <label for="speed-range" class="option-label"
          >Speed: <span id="speed-value">1.0×</span></label
        >
        <input
          id="speed-range"
          class="option-input speed-range"
          type="range"
          min="0.5"
          max="2"
          step="0.1"
          value="1"
        />
      </div>

      <button id="read-article-btn" class="pick-btn">📖 Read main article</button>
      <button id="pick-element-btn" class="pick-btn">🎯 Pick element to read</button>
      <div class="toggle-hint">Then hover &amp; click a paragraph or section on the page</div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
